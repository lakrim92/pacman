<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Pac-Man</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:flex-start;
  overflow:hidden; touch-action:none;
  font-family: monospace;
}
#hud {
  width:100%; max-width:520px;
  display:flex; justify-content:space-around; align-items:center;
  padding:6px 4px; flex-shrink:0;
}
.hb { display:flex; flex-direction:column; align-items:center; }
.hl { color:#ffb8ff; font-size:9px; }
.hv { color:#fff; font-size:14px; font-weight:bold; }
#hv-level { color:#0ff; }
#hv-map   { color:#0f0; }
#hv-hi    { color:#ff0; }
#lives-wrap { display:flex; gap:4px; }
.life-dot { color:#FFD700; font-size:16px; }
#wrap {
  flex:1; width:100%; max-width:520px;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
canvas { display:block; background:#000; touch-action:none; }
#dpad {
  width:100%; max-width:520px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,56px);
  gap:5px; padding:6px; flex-shrink:0;
}
.btn {
  background:rgba(255,255,0,.1);
  border:2px solid rgba(255,255,0,.35);
  border-radius:10px; color:#ff0; font-size:24px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none;
}
.btn:active, .btn.pressed { background:rgba(255,255,0,.3); }
#btn-up    { grid-column:2; grid-row:1; }
#btn-left  { grid-column:1; grid-row:2; }
#btn-down  { grid-column:2; grid-row:2; }
#btn-right { grid-column:3; grid-row:2; }
/* Overlay */
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.9);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  z-index:100; padding:24px; text-align:center;
  color:#fff;
}
#overlay h1 { font-size:36px; color:#FFD700; letter-spacing:6px; margin-bottom:16px; }
.ov-sub  { font-size:12px; color:#aaa; margin:5px 0; line-height:1.8; }
.ov-score{ font-size:24px; color:#0ff; margin:12px 0; }
.ov-rec  { font-size:13px; color:#ff0; margin:4px 0; }
.ov-map  { font-size:12px; color:#0f0; }
#play-btn {
  margin-top:22px; padding:16px 40px;
  background:#FFD700; color:#000; border:none;
  border-radius:10px; font-size:15px; font-weight:bold;
  cursor:pointer; font-family:monospace; letter-spacing:2px;
}
#play-btn:active { background:#ffc400; }
#banner {
  position:fixed; top:0; left:0; right:0;
  background:rgba(0,200,255,.15);
  color:#0ff; font-size:13px; text-align:center;
  padding:8px; z-index:50; display:none;
  border-bottom:1px solid rgba(0,200,255,.3);
}
#errdiv {
  position:fixed; bottom:0; left:0; right:0;
  background:red; color:#fff;
  font-size:11px; padding:4px;
  display:none; z-index:200;
  word-break:break-all;
}
</style>
</head>
<body>

<div id="hud">
  <div class="hb"><span class="hl">SCORE</span><span class="hv" id="hv-score">0</span></div>
  <div class="hb"><span class="hl">NIVEAU</span><span class="hv" id="hv-level">1</span></div>
  <div class="hb"><span class="hl">CARTE</span><span class="hv" id="hv-map">1/3</span></div>
  <div class="hb"><span class="hl">RECORD</span><span class="hv" id="hv-hi">0</span></div>
  <div class="hb"><span class="hl">VIES</span><div id="lives-wrap"></div></div>
</div>

<div id="wrap"><canvas id="c"></canvas></div>

<div id="dpad">
  <div class="btn" id="btn-up">▲</div>
  <div class="btn" id="btn-left">◀</div>
  <div class="btn" id="btn-down">▼</div>
  <div class="btn" id="btn-right">▶</div>
</div>

<div id="banner"></div>
<div id="errdiv" id="errdiv"></div>

<div id="overlay">

var aCtx = null;
function getAC() {
  if (!aCtx) {
    try { aCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  // Mobile : AudioContext démarre en "suspended", il faut le reprendre
  if (aCtx && aCtx.state === 'suspended') {
    aCtx.resume();
  }
  return aCtx;
}
function beep(freq, dur, type, vol) {
  try {
    var ac = getAC(); if (!ac) return;
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(vol||0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sfxEat()   { beep(440, 0.04, 'sine', 0.08); }
function sfxPow()   { beep(150, 0.3, 'sawtooth', 0.18); }
function sfxDie()   { [350,250,150,80].forEach(function(f,i){ setTimeout(function(){ beep(f,.15,'square',.18); }, i*130); }); }
function sfxGhost() { [800,600,900].forEach(function(f,i){ setTimeout(function(){ beep(f,.07,'sine',.18); }, i*55); }); }
function sfxWin()   { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ beep(f,.18,'sine',.22); }, i*180); }); }

// ─── DIFFICULTÉ ──────────────────────────────────────────────────────────────
function difficulty(level) {
  var n = level - 1;
  return {
    pacSpd:    Math.min(0.075 + n*0.003, 0.12),
    ghostSpd:  Math.min(0.060 + n*0.004, 0.11),
    frightSpd: 0.035,
    frightDur: Math.max(320 - n*18, 90),
  };
}

// ─── ÉTAT GLOBAL ─────────────────────────────────────────────────────────────
var maze, dots, score, hiScore, lives, level, diff;
var pac, ghosts;
var state = 'idle';      // idle | playing | dying | won | gameover
var powTimer = 0, eatMult = 1;
var frame = 0, flashT = 0;
var modeT = 0, modeP = 0;
var MODE_DUR = [420,1200,420,1200,300,1200,300,99999];

var GCOL  = ['#ff0000','#ffb8ff','#00ffff','#ffb851'];
var GSCATTER = [{x:25,y:0},{x:2,y:0},{x:27,y:30},{x:0,y:30}];
var GSTART   = [{x:13.5,y:11},{x:13.5,y:13},{x:11.5,y:13},{x:15.5,y:13}];
var GDEL     = [0,200,350,500];

// ─── INIT ────────────────────────────────────────────────────────────────────
function mapIdx()   { return (level-1) % 3; }
function newMaze()  { return MAPS[mapIdx()].map(function(r){ return r.slice(); }); }

function countDots() {
  var n = 0;
  for (var r=0;r<ROWS;r++) for (var c=0;c<COLS;c++) if (maze[r][c]===DOT||maze[r][c]===POWER) n++;
  return n;
}

function init(keepScore) {
  if (!keepScore) { score = 0; lives = 3; }
  maze  = newMaze();
  diff  = difficulty(level);
  dots  = countDots();
  powTimer = 0; eatMult = 1; flashT = 0;
  modeT = 0; modeP = 0;
  spawnPac(); spawnGhosts();
  updateHUD();
}

function spawnPac() {
  // Commence à se déplacer vers la gauche comme dans le Pac-Man original
  pac = { x:13.5, y:23, dx:-1, dy:0, ndx:-1, ndy:0, mth:0.2, mdir:1 };
}

function spawnGhosts() {
  ghosts = GCOL.map(function(col,i) {
    return {
      col:col, x:GSTART[i].x, y:GSTART[i].y,
      dx: i===0?-1:0, dy:0,
      mode: i===0?'active':'house',
      fright:false, eaten:false,
      scatter:GSCATTER[i],
      exDelay:GDEL[i], exTimer:0,
    };
  });
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hv-score').textContent = score;
  document.getElementById('hv-level').textContent = level;
  document.getElementById('hv-map').textContent   = (mapIdx()+1)+'/3';
  document.getElementById('hv-hi').textContent    = hiScore;
  var lw = document.getElementById('lives-wrap'); lw.innerHTML = '';
  for (var i=0;i<lives;i++) {
    var s = document.createElement('span'); s.className='life-dot'; s.textContent='●'; lw.appendChild(s);
  }
}

// ─── COLLISION MURS ──────────────────────────────────────────────────────────
function wallAt(px, py) {
  var col = ((Math.floor(px) % COLS) + COLS) % COLS;
  var row = Math.floor(py);
  if (row < 0 || row >= ROWS) return false;
  var v = maze[row][col];
  return v === WALL || v === DOOR;
}

// Collision directionnelle : on ne teste que le côté dans la direction du mouvement
function blocked(px, py, dx, dy) {
  var s = 0.32; // demi-largeur de pac (< 0.5 pour passer dans les couloirs)
  if (dx > 0) return wallAt(px + 0.5, py - s) || wallAt(px + 0.5, py + s);
  if (dx < 0) return wallAt(px - 0.5, py - s) || wallAt(px - 0.5, py + s);
  if (dy > 0) return wallAt(px - s, py + 0.5) || wallAt(px + s, py + 0.5);
  if (dy < 0) return wallAt(px - s, py - 0.5) || wallAt(px + s, py - 0.5);
  return false;
}

// ─── UPDATE PAC-MAN ──────────────────────────────────────────────────────────
function updatePac() {
  var sp = diff.pacSpd;

  // Snap à la grille pour autoriser un virage propre
  var cx = Math.round(pac.x), cy = Math.round(pac.y);
  var nearCenter = Math.abs(pac.x - cx) < sp + 0.12 && Math.abs(pac.y - cy) < sp + 0.12;

  // Tentative de virage (seulement près d'un centre de cellule)
  if (nearCenter && (pac.ndx !== 0 || pac.ndy !== 0)) {
    if (!blocked(cx, cy, pac.ndx, pac.ndy)) {
      pac.x = cx; pac.y = cy; // snap
      pac.dx = pac.ndx; pac.dy = pac.ndy;
    }
  }

  // Mouvement dans la direction courante
  if (pac.dx !== 0 || pac.dy !== 0) {
    if (!blocked(pac.x, pac.y, pac.dx, pac.dy)) {
      pac.x += pac.dx * sp;
      pac.y += pac.dy * sp;
    } else {
      // Bloquer et snap au centre de la cellule courante
      pac.x = Math.round(pac.x);
      pac.y = Math.round(pac.y);
    }
  }

  // tunnel
  if (pac.x < -0.5) pac.x = COLS - 0.5;
  if (pac.x > COLS - 0.5) pac.x = -0.5;

  // animation bouche
  if (pac.dx !== 0 || pac.dy !== 0) {
    pac.mth += 0.05 * pac.mdir;
    if (pac.mth >= 0.25) pac.mdir = -1;
    if (pac.mth <= 0.01) pac.mdir =  1;
  }

  // manger
  var col = Math.round(pac.x), row = Math.round(pac.y);
  if (row>=0&&row<ROWS&&col>=0&&col<COLS) {
    var v = maze[row][col];
    if (v===DOT) {
      maze[row][col]=EMPTY; score+=10; dots--; sfxEat(); updateHUD();
      if (dots<=0) levelWon();
    } else if (v===POWER) {
      maze[row][col]=EMPTY; score+=50; dots--; sfxPow(); updateHUD();
      powTimer=diff.frightDur; eatMult=1;
      ghosts.forEach(function(g){
        if (!g.eaten&&g.mode==='active'){ g.fright=true; g.dx=-g.dx; g.dy=-g.dy; }
      });
      if (dots<=0) levelWon();
    }
  }
}

// ─── UPDATE FANTÔMES ─────────────────────────────────────────────────────────
function updateGhosts() {
  modeT++;
  if (modeT >= MODE_DUR[modeP]) { modeP=Math.min(modeP+1,MODE_DUR.length-1); modeT=0; }
  var gmode = modeP%2===0 ? 'scatter':'chase';

  if (powTimer>0) { powTimer--; if(powTimer<=0) ghosts.forEach(function(g){g.fright=false;}); }

  ghosts.forEach(function(g,i) {
    if (g.mode==='house') {
      g.exTimer++;
      if (g.exTimer >= g.exDelay) g.mode='exiting';
      else { g.y += 0.04*(i%2===0?1:-1); g.y=Math.max(12,Math.min(14,g.y)); return; }
    }
    if (g.mode==='exiting') {
      if (Math.abs(g.x-13.5)>0.15) g.x+=(13.5-g.x)*0.12;
      if (g.y>11) g.y-=0.07;
      else { g.y=11; g.mode='active'; g.dx=-1; g.dy=0; }
      return;
    }

    var target = null;
    if (g.eaten) {
      target={x:13.5,y:13};
      if (Math.abs(g.x-13.5)<0.5&&Math.abs(g.y-13)<0.5) {
        g.eaten=false; g.fright=false; g.mode='house'; g.exTimer=0; g.exDelay=120; return;
      }
    } else if (!g.fright) {
      if (gmode==='scatter') target=g.scatter;
      else target=chaseTarget(g,i);
    }

    moveGhost(g, target);
  });
}

function chaseTarget(g,i) {
  var px=pac.x,py=pac.y,pdx=pac.dx,pdy=pac.dy;
  if (i===0) return {x:px,y:py};
  if (i===1) return {x:px+pdx*4,y:py+pdy*4};
  if (i===2) {
    var ax=px+pdx*2,ay=py+pdy*2,b=ghosts[0];
    return {x:ax+(ax-b.x),y:ay+(ay-b.y)};
  }
  return Math.hypot(g.x-px,g.y-py)>8?{x:px,y:py}:g.scatter;
}

function moveGhost(g, target) {
  var sp = g.eaten ? diff.ghostSpd * 1.8 : (g.fright ? diff.frightSpd : diff.ghostSpd);

  // Choix de direction au centre de chaque cellule
  var cx = Math.round(g.x), cy = Math.round(g.y);
  var atCenter = Math.abs(g.x - cx) < sp + 0.08 && Math.abs(g.y - cy) < sp + 0.08;

  if (atCenter) {
    g.x = cx; g.y = cy;
    var DIRS = [[1,0],[-1,0],[0,1],[0,-1]];
    var valid = DIRS.filter(function(d) {
      if (d[0] === -g.dx && d[1] === -g.dy) return false; // pas demi-tour
      var nx = cx + d[0], ny = cy + d[1];
      if (ny < 0 || ny >= ROWS) return false;
      var col = ((nx % COLS) + COLS) % COLS;
      var v = maze[ny][col];
      return v !== WALL && (v !== DOOR || g.eaten);
    });
    if (valid.length) {
      var chosen;
      if (g.fright && !g.eaten) {
        chosen = valid[Math.floor(Math.random() * valid.length)];
      } else if (target) {
        chosen = valid.reduce(function(b, d) {
          var nd = Math.hypot(cx + d[0] - target.x, cy + d[1] - target.y);
          var bd = Math.hypot(cx + b[0] - target.x, cy + b[1] - target.y);
          return nd < bd ? d : b;
        });
      } else {
        chosen = valid[0];
      }
      g.dx = chosen[0]; g.dy = chosen[1];
    }
  }

  g.x += g.dx * sp;
  g.y += g.dy * sp;
  if (g.x < -0.5) g.x = COLS - 0.5;
  if (g.x > COLS - 0.5) g.x = -0.5;
}

// ─── COLLISIONS ──────────────────────────────────────────────────────────────
var floats=[];
function checkCol() {
  ghosts.forEach(function(g){
    if(g.mode!=='active') return;
    if(Math.hypot(pac.x-g.x,pac.y-g.y)<0.75){
      if(g.fright&&!g.eaten){
        g.eaten=true; g.fright=false;
        var pts=200*Math.pow(2,eatMult-1); eatMult++; score+=pts; updateHUD();
        sfxGhost(); floats.push({x:g.x,y:g.y,v:pts,t:50});
      } else if(!g.eaten){ startDie(); }
    }
  });
}

// ─── ÉTATS ───────────────────────────────────────────────────────────────────
function startDie() {
  if(state!=='playing') return;
  state='dying'; sfxDie();
  setTimeout(function(){
    lives--;
    if(lives<=0){ doGameOver(); return; }
    updateHUD(); spawnPac(); spawnGhosts(); state='playing';
  }, 1500);
}

function levelWon() {
  state='won'; sfxWin(); flashT=100;
  setTimeout(function(){
    level++;
    init(true);
    state='playing';
    banner('CARTE '+(mapIdx()+1)+'/3 — '+MAP_NAMES[mapIdx()], 2200);
  }, 2800);
}

function doGameOver() {
  state='gameover';
  var rec = score>hiScore;
  if(rec){ hiScore=score; try{localStorage.setItem('pm_hi',hiScore);}catch(e){} }
  updateHUD();
  showOverlay('GAME OVER','#f44',rec);
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawMaze() {
  var mi = mapIdx();
  var wf = WALL_FILL[mi], we = WALL_EDGE[mi];

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  for (var r=0;r<ROWS;r++) {
    for (var c=0;c<COLS;c++) {
      var v=maze[r][c], x=c*CELL, y=r*CELL;
      if (v===WALL) {
        ctx.fillStyle = we;
        ctx.fillRect(x,y,CELL,CELL);
        ctx.fillStyle = wf;
        ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
      } else if (v===DOT) {
        ctx.fillStyle='#ffccbb';
        ctx.beginPath();
        ctx.arc(x+CELL/2,y+CELL/2,2,0,6.28318);
        ctx.fill();
      } else if (v===POWER) {
        var p=0.6+0.4*Math.sin(frame*0.13);
        ctx.fillStyle='rgba(255,200,100,'+p+')';
        ctx.beginPath();
        ctx.arc(x+CELL/2,y+CELL/2,5,0,6.28318);
        ctx.fill();
      } else if (v===DOOR) {
        ctx.fillStyle='#ffaaff';
        ctx.fillRect(x+1,y+CELL/2-1,CELL-2,3);
      }
    }
  }
}

function drawPac() {
  var x=pac.x*CELL+CELL/2, y=pac.y*CELL+CELL/2, r=CELL*0.44;
  var angle=0;
  if(pac.dx===1) angle=0;
  else if(pac.dx===-1) angle=Math.PI;
  else if(pac.dy===-1) angle=-Math.PI/2;
  else if(pac.dy===1)  angle=Math.PI/2;

  ctx.save();
  ctx.translate(x,y); ctx.rotate(angle);

  if (state==='dying') {
    var progress=Math.min(1,(Date.now()%1500)/1500);
    var open=Math.PI*progress;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.moveTo(0,0);
    ctx.arc(0,0,r,open,6.28318-open);
    ctx.closePath(); ctx.fill();
    ctx.restore(); return;
  }

  var m = pac.mth*Math.PI;
  ctx.fillStyle='#FFD700';
  ctx.beginPath(); ctx.moveTo(0,0);
  ctx.arc(0,0,r,m,6.28318-m);
  ctx.closePath(); ctx.fill();
  // highlight
  ctx.fillStyle='rgba(255,255,200,0.3)';
  ctx.beginPath(); ctx.arc(-r*0.2,-r*0.25,r*0.35,0,6.28318); ctx.fill();
  // oeil
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(r*0.2,-r*0.5,r*0.1,0,6.28318); ctx.fill();
  ctx.restore();
}

function drawGhost(g) {
  if(g.mode==='house'&&g.exTimer<g.exDelay*0.25) return;
  var x=g.x*CELL+CELL/2, y=g.y*CELL+CELL/2, r=CELL*0.44;
  ctx.save(); ctx.translate(x,y);

  if (g.eaten) { drawGhostEyes(r,g.dx,g.dy); ctx.restore(); return; }

  var col=g.col;
  if (g.fright) {
    var blink=powTimer<100&&Math.floor(powTimer/12)%2===0;
    col=blink?'#ffffff':'#2121cc';
  }

  // corps
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.arc(0,0,r,Math.PI,0,false);
  ctx.lineTo(r,r);
  var step=r*2/3;
  for(var i=3;i>=0;i--) ctx.lineTo(r-i*step, r+(i%2===0?0:r*0.3));
  ctx.lineTo(-r,r); ctx.closePath(); ctx.fill();

  if(!g.fright) {
    drawGhostEyes(r,g.dx,g.dy);
  } else {
    // yeux effrayés
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(-r*.3,-r*.1,r*.16,0,6.28318); ctx.fill();
    ctx.beginPath(); ctx.arc( r*.3,-r*.1,r*.16,0,6.28318); ctx.fill();
  }
  ctx.restore();
}

function drawGhostEyes(r,dx,dy) {
  var ex=dx*r*0.1, ey=dy*r*0.1;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-r*.28,-r*.12,r*.2,0,6.28318); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.28,-r*.12,r*.2,0,6.28318); ctx.fill();
  ctx.fillStyle='#00f';
  ctx.beginPath(); ctx.arc(-r*.28+ex,-r*.12+ey,r*.1,0,6.28318); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.28+ex,-r*.12+ey,r*.1,0,6.28318); ctx.fill();
}

function drawFloats() {
  ctx.textAlign='center';
  for(var i=floats.length-1;i>=0;i--){
    var f=floats[i]; f.t--; f.y-=0.025;
    if(f.t<=0){floats.splice(i,1);continue;}
    ctx.globalAlpha=f.t/50;
    ctx.fillStyle='#0ff'; ctx.font='bold 11px monospace';
    ctx.fillText(f.v, f.x*CELL+CELL/2, f.y*CELL);
    ctx.globalAlpha=1;
  }
}

function drawFlash() {
  if(flashT<=0) return; flashT--;
  if(Math.floor(flashT/8)%2===0){
    ctx.strokeStyle='#fff'; ctx.lineWidth=2;
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++)
      if(maze[r][c]===WALL) ctx.strokeRect(c*CELL+1,r*CELL+1,CELL-2,CELL-2);
  }
}

// ─── BOUCLE ──────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  frame++;
  try {
    drawMaze();
    if(state==='playing'||state==='dying'||state==='won'){
      if(state==='playing'){ updatePac(); updateGhosts(); checkCol(); }
      ghosts.forEach(drawGhost);
      drawPac();
      drawFloats();
      drawFlash();
    }
  } catch(e) {
    document.getElementById('errdiv').style.display='block';
    document.getElementById('errdiv').textContent='ERR: '+e.message+' '+e.stack;
  }
}

// ─── INPUT CLAVIER ───────────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  if(state!=='playing') return;
  var k={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
          w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]}[e.key];
  if(k){pac.ndx=k[0];pac.ndy=k[1];e.preventDefault();}
});

// ─── BOUTONS D-PAD ───────────────────────────────────────────────────────────
function bindBtn(id,dx,dy){
  var el=document.getElementById(id);
  function act(e){
    e.preventDefault();
    if(state==='playing'){pac.ndx=dx;pac.ndy=dy;}
    el.classList.add('pressed');
    setTimeout(function(){el.classList.remove('pressed');},150);
  }
  el.addEventListener('touchstart',act,{passive:false});
  el.addEventListener('mousedown',act);
}
bindBtn('btn-up',   0,-1);
bindBtn('btn-left', -1,0);
bindBtn('btn-down', 0, 1);
bindBtn('btn-right',1, 0);

// ─── SWIPE sur le canvas ─────────────────────────────────────────────────────
var tx0, ty0;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
}, {passive: false});

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault(); // empêche le scroll pendant le jeu
}, {passive: false});

canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  if (tx0 === undefined || state !== 'playing') return;
  var dx = e.changedTouches[0].clientX - tx0;
  var dy = e.changedTouches[0].clientY - ty0;
  var dist = Math.sqrt(dx*dx + dy*dy);
  if (dist > 15) { // seuil 15px
    if (Math.abs(dx) > Math.abs(dy)) { pac.ndx = dx > 0 ? 1 : -1; pac.ndy = 0; }
    else                              { pac.ndy = dy > 0 ? 1 : -1; pac.ndx = 0; }
  }
  tx0 = ty0 = undefined;
}, {passive: false});

// ─── OVERLAY / UI ────────────────────────────────────────────────────────────
var overlay=document.getElementById('overlay');

function showOverlay(title,color,isRec){
  overlay.style.display='flex';
  overlay.innerHTML=
    '<h1 style="color:#FFD700">PAC-MAN</h1>'+
    '<p style="font-size:18px;color:'+color+';margin:8px 0">'+title+'</p>'+
    '<p class="ov-score" style="font-size:22px;color:#0ff;margin:10px 0">SCORE : '+score+'</p>'+
    '<p class="ov-map" style="font-size:12px;color:#0f0">Carte '+(mapIdx()+1)+'/3 — '+MAP_NAMES[mapIdx()]+'</p>'+
    '<p style="font-size:12px;color:#f80">Niveau atteint : '+level+'</p>'+
    (isRec?'<p class="ov-rec" style="color:#ff0;font-size:13px;margin:6px 0">★ NOUVEAU RECORD ★</p>':'')+
    '<p style="font-size:11px;color:#888;margin-top:6px">Record : '+hiScore+'</p>'+
    '<button id="play-btn" style="margin-top:20px;padding:16px 40px;background:#FFD700;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:bold;cursor:pointer;font-family:monospace;letter-spacing:2px;">▶ REJOUER</button>';
  document.getElementById('play-btn').addEventListener('click',startGame);
}

function banner(msg,dur){
  var b=document.getElementById('banner');
  b.textContent=msg; b.style.display='block';
  setTimeout(function(){b.style.display='none';},dur);
}

function startGame(){
  overlay.style.display='none';
  level=1; score=0; lives=3;
  init(true);
  state='playing';
  banner('CARTE 1/3 — Classique',2000);
  getAC(); // débloquer AudioContext après geste utilisateur
}

document.getElementById('play-btn').addEventListener('click',startGame);

// ─── DÉMARRAGE ───────────────────────────────────────────────────────────────
try { hiScore=parseInt(localStorage.getItem('pm_hi'))||0; } catch(e){hiScore=0;}
level=1; score=0; lives=3;
init(true);
state='idle';
requestAnimationFrame(loop);

// ─── PWA ─────────────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
