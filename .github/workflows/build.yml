name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # bouton "Run workflow" manuel sur GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Récupérer le code ───────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Java 17 (requis par AGP 8.x) ──────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK (préinstallé sur ubuntu-latest) ────────
      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" 2>/dev/null || true

      - name: Write local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      # ── 4. Synchroniser le jeu dans les assets ────────────────
      - name: Sync game to assets
        run: cp index.html android/app/src/main/assets/index.html

      # ── 5. Télécharger Gradle 8.4 ─────────────────────────────
      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      # ── 6. Build APK debug ────────────────────────────────────
      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug --no-daemon --stacktrace

      # ── 7. Uploader l'APK comme artefact ─────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PacMan-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 8. Créer une Release GitHub automatique ───────────────
      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-latest
          name: "PAC-MAN APK — dernière version"
          body: |
            ## Installer PAC-MAN sur Android

            1. Télécharge **PacMan.apk** ci-dessous
            2. Sur ton Samsung : **Paramètres → Sécurité → Sources inconnues** → Autoriser
            3. Ouvre le fichier APK téléchargé → Installer

            **3 cartes · Difficulté progressive · Fonctionne hors-ligne**

            Commit : ${{ steps.sha.outputs.short }}
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
