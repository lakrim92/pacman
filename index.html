<style>
:root { --safe-top: env(safe-area-inset-top, 0px); }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body {
  width:100%; height:100%; background:#000; overflow:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
  font-family:'Courier New', monospace; touch-action:none;
}
#hud {
  width:100%; max-width:504px; flex-shrink:0;
  display:flex; justify-content:space-around; align-items:center;
  padding:6px 4px; padding-top:calc(6px + var(--safe-top));
  background:#000; z-index:10;
}
.hb { display:flex; flex-direction:column; align-items:center; gap:1px; }
.hl { color:#ffb8ff; font-size:8px; letter-spacing:1px; text-transform:uppercase; }
.hv { color:#fff; font-size:15px; font-weight:bold; min-width:40px; text-align:center; }
#wrap { flex:1; width:100%; max-width:504px; display:flex; align-items:center; justify-content:center; overflow:hidden; min-height:0; }
canvas { display:block; image-rendering:pixelated; image-rendering:crisp-edges; cursor:none; }
#dpad {
  width:100%; max-width:504px; flex-shrink:0;
  display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:54px 54px;
  gap:4px; padding:4px 8px 8px; background:#000;
}
.btn {
  background:rgba(255,255,0,.08); border:1.5px solid rgba(255,255,0,.3);
  border-radius:10px; color:#FFD700; font-size:22px;
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; cursor:pointer;
}
.btn:active { background:rgba(255,255,0,.28); border-color:rgba(255,255,0,.7); }
#btn-up    { grid-column:2; grid-row:1; }
#btn-left  { grid-column:1; grid-row:2; }
#btn-down  { grid-column:2; grid-row:2; }
#btn-right { grid-column:3; grid-row:2; }
/* ── OVERLAY ── */
#ov {
  position:fixed; inset:0; background:rgba(0,0,0,.92);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; padding:24px; text-align:center; gap:10px;
}
#ov h1 { font-size:38px; color:#FFD700; letter-spacing:8px; text-shadow:0 0 20px #FFD70088; }
#ov .sub { font-size:11px; color:#888; line-height:1.9; }
#ov .big { font-size:26px; color:#0ff; }
#ov .rec { font-size:13px; color:#FFD700; }
#ov .info { font-size:11px; color:#0f0; }
#ov button {
  margin-top:6px; padding:16px 44px; background:#FFD700; color:#000;
  border:none; border-radius:10px; font-size:16px; font-weight:bold;
  cursor:pointer; font-family:inherit; letter-spacing:2px;
}
#ov button:active { background:#e6c200; }
/* ── BANNER ── */
#banner {
  position:fixed; top:0; left:0; right:0; z-index:50;
  background:rgba(0,0,0,.7); border-bottom:1px solid rgba(0,200,255,.4);
  color:#0ff; font-size:12px; text-align:center;
  padding:8px; display:none; letter-spacing:1px;
}
</style>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = W;
canvas.height = H;

function resize() {
  const wrap  = document.getElementById('wrap');
  const avW   = wrap.clientWidth  || window.innerWidth;
  const avH   = wrap.clientHeight || window.innerHeight * 0.65;
  const scale = Math.min(avW / W, avH / H);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));

// ═══════════════════════════════════════════════════════════════
// AUDIO (Web Audio API)
// ═══════════════════════════════════════════════════════════════
let AC = null;

function unlockAudio() {
  if (!AC) {
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
  }
  if (AC.state === 'suspended') AC.resume();
}

function beep(freq, dur, type = 'square', vol = 0.12, freqEnd = null) {
  try {
    unlockAudio();
    if (!AC || AC.state !== 'running') return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, AC.currentTime);
    if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(AC.currentTime);
    o.stop(AC.currentTime + dur);
  } catch(e) {}
}

const SFX = {
  dot:   () => beep(440, 0.04, 'sine', 0.07),
  power: () => { beep(180, 0.2, 'sawtooth', 0.18, 80); beep(280, 0.3, 'sine', 0.1, 100); },
  die:   () => [380,280,180,90].forEach((f,i) => setTimeout(() => beep(f,.14,'square',.18), i*130)),
  ghost: () => [800,1000,700,900].forEach((f,i) => setTimeout(() => beep(f,.06,'sine',.2), i*50)),
  win:   () => [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => beep(f,.16,'sine',.2), i*160)),
  start: () => [262,330,392,523].forEach((f,i) => setTimeout(() => beep(f,.12,'sine',.15), i*100)),
};

// ═══════════════════════════════════════════════════════════════
// ÉTAT
// ═══════════════════════════════════════════════════════════════
const STATE = { TITLE:0, PLAYING:1, DYING:2, WIN:3, GAMEOVER:4 };

let maze, totalDots;
let score = 0, hiScore = 0, lives = 3, level = 1;
let gameState = STATE.TITLE;
let pac, ghosts;
let powerTimer = 0, eatMult = 1;
let modeTimer = 0, modeIdx = 0;
let flashTimer = 0;
let popups = [];   // points flottants à afficher
let lastTs = 0;   // timestamp dernière frame

// ─── DIFFICULTÉ ──────────────────────────────────────────────
function getSpeed(base, lvl) {
  return Math.min(base + (lvl - 1) * 0.4, base * 1.7);
}

// ─── MAP HELPERS ─────────────────────────────────────────────
function mapIdx()  { return (level - 1) % 3; }
function freshMaze() { return MAP_DATA[mapIdx()].map(r => [...r]); }
function countDots(m) {
  let n = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (m[r][c] === T_DOT || m[r][c] === T_POWER) n++;
  return n;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
function initLevel(keepScore = false) {
  if (!keepScore) { score = 0; lives = 3; }
  maze       = freshMaze();
  totalDots  = countDots(maze);
  powerTimer = 0; eatMult = 1;
  modeTimer  = 0; modeIdx = 0;
  flashTimer = 0; popups  = [];
  spawnPac();
  spawnGhosts();
  hud();
}

function spawnPac() {
  pac = {
    x: 14, y: 23,
    dx: 1, dy: 0,     // part vers la droite au départ
    nx: 1, ny: 0,     // direction demandée
    spd: getSpeed(PAC_SPD_BASE, level),
  };
}

// Positions et configs des 4 fantômes
const GHOST_CFG = [
  { name:'Blinky', col:'#ff0000', sx:13.5, sy:11,   mode:'scatter', scatter:{x:25,y:0},  delay:0    },
  { name:'Pinky',  col:'#ffb8ff', sx:13.5, sy:13,   mode:'house',   scatter:{x:2, y:0},  delay:2.5  },
  { name:'Inky',   col:'#00ffff', sx:11.5, sy:13,   mode:'house',   scatter:{x:27,y:30}, delay:5.0  },
  { name:'Clyde',  col:'#ffb851', sx:15.5, sy:13,   mode:'house',   scatter:{x:0, y:30}, delay:8.0  },
];

function spawnGhosts() {
  ghosts = GHOST_CFG.map((cfg, i) => ({
    name: cfg.name, col: cfg.col,
    x: cfg.sx, y: cfg.sy,
    dx: 0, dy: i === 0 ? 0 : (i % 2 === 0 ? 1 : -1),
    mode: cfg.mode,         // house | leaving | scatter | chase | fright | eaten
    scatter: cfg.scatter,
    delay: cfg.delay,       // secondes avant de sortir
    elapsed: 0,             // temps écoulé
    fright: false,
    eaten: false,
    houseY: cfg.sy,
    spd: getSpeed(GHOST_SPD_BASE, level),
  }));
}

// ═══════════════════════════════════════════════════════════════
// COLLISION MAZE
// ═══════════════════════════════════════════════════════════════
function tileAt(tx, ty) {
  const col = ((Math.floor(tx) % COLS) + COLS) % COLS;
  const row = Math.floor(ty);
  if (row < 0 || row >= ROWS) return T_EMPTY;
  return maze[row][col];
}

// Peut-on se déplacer en direction (dx,dy) depuis (px,py) ?
// Vérifie la cellule suivante dans la direction demandée (approche tile-based standard)
function canMove(px, py, dx, dy, passGate = false) {
  if (dx !== 0) {
    return !isWall(px + dx, Math.round(py), passGate);
  } else if (dy !== 0) {
    return !isWall(Math.round(px), py + dy, passGate);
  }
  return true;
}

function isWall(px, py, passGate = false) {
  const v = tileAt(px, py);
  if (v === T_WALL) return true;
  if (v === T_DOOR && !passGate) return true;
  return false;
}

// ═══════════════════════════════════════════════════════════════
// UPDATE PAC-MAN  (deltaTime en secondes)
// ═══════════════════════════════════════════════════════════════
function updatePac(dt) {
  const spd = pac.spd * dt;
  const cx  = Math.round(pac.x);
  const cy  = Math.round(pac.y);
  const nearCX = Math.abs(pac.x - cx) < spd + 0.15;
  const nearCY = Math.abs(pac.y - cy) < spd + 0.15;
  const atCenter = nearCX && nearCY;

  // Tenter un virage au centre de la cellule
  if (atCenter && (pac.nx !== 0 || pac.ny !== 0)) {
    if (canMove(cx, cy, pac.nx, pac.ny)) {
      // Snap propre puis virage
      pac.x = cx; pac.y = cy;
      pac.dx = pac.nx; pac.dy = pac.ny;
    }
  }

  // Avancer dans la direction courante
  if (pac.dx !== 0 || pac.dy !== 0) {
    if (canMove(pac.x, pac.y, pac.dx, pac.dy)) {
      pac.x += pac.dx * spd;
      pac.y += pac.dy * spd;
    } else if (atCenter) {
      pac.x = cx; pac.y = cy;  // stopper proprement au centre
    }
  }

  // Tunnel wrap
  if (pac.x < -0.5) pac.x = COLS - 0.5;
  if (pac.x > COLS - 0.5) pac.x = -0.5;

  // Manger
  eat(Math.round(pac.x), Math.round(pac.y));
}

function eat(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return;
  const v = maze[row][col];
  if (v === T_DOT) {
    maze[row][col] = T_EMPTY;
    score += 10; totalDots--;
    SFX.dot(); hud();
    if (totalDots <= 0) triggerWin();
  } else if (v === T_POWER) {
    maze[row][col] = T_EMPTY;
    score += 50; totalDots--;
    SFX.power(); hud();
    activatePower();
    if (totalDots <= 0) triggerWin();
  }
}

function activatePower() {
  powerTimer = Math.max(6 - (level - 1) * 0.4, 2.5); // sec, min 2.5s
  eatMult = 1;
  ghosts.forEach(g => {
    if (g.mode === 'scatter' || g.mode === 'chase') {
      g.fright = true;
      g.dx = -g.dx; g.dy = -g.dy;  // demi-tour
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// UPDATE FANTÔMES
// ═══════════════════════════════════════════════════════════════
function updateGhosts(dt) {
  // Mise à jour du timer mode scatter/chase
  modeTimer += dt;
  if (modeTimer >= MODE_SEC[modeIdx]) {
    modeIdx = Math.min(modeIdx + 1, MODE_SEC.length - 1);
    modeTimer = 0;
  }
  const globalMode = modeIdx % 2 === 0 ? 'scatter' : 'chase';

  // Power timer
  if (powerTimer > 0) {
    powerTimer -= dt;
    if (powerTimer <= 0) {
      powerTimer = 0;
      eatMult = 1;
      ghosts.forEach(g => { g.fright = false; });
    }
  }

  ghosts.forEach((g, i) => updateOneGhost(g, i, dt, globalMode));
}

function updateOneGhost(g, i, dt, globalMode) {
  // ── Mode house : rebondir verticalement ──────────────────
  if (g.mode === 'house') {
    g.elapsed += dt;
    g.y += g.dy * 1.5 * dt;
    if (g.y > g.houseY + 0.5) g.dy = -1;
    if (g.y < g.houseY - 0.5) g.dy =  1;
    if (g.elapsed >= g.delay) {
      g.mode = 'leaving';
      g.dy = -1; g.dx = 0;
    }
    return;
  }

  // ── Mode leaving : sortir de la maison ───────────────────
  if (g.mode === 'leaving') {
    // 1) Centrer sur la colonne 13.5
    if (Math.abs(g.x - 13.5) > 0.05) {
      const dir = g.x < 13.5 ? 1 : -1;
      g.x += dir * 2.5 * dt;
      if (Math.abs(g.x - 13.5) < 0.05) g.x = 13.5;
    } else {
      // 2) Monter jusqu'à row 11
      g.y -= 2.5 * dt;
      if (g.y <= 11) {
        g.y = 11; g.x = 13.5;
        g.mode = globalMode;
        g.dx = -1; g.dy = 0;
      }
    }
    return;
  }

  // ── Mode eaten : retourner à la maison ───────────────────
  if (g.eaten) {
    moveToTarget(g, {x:13.5, y:13}, EATEN_SPD * dt, true);
    if (Math.abs(g.x - 13.5) < 0.2 && Math.abs(g.y - 13) < 0.2) {
      g.x = 13.5; g.y = 13;
      g.eaten = false; g.fright = false;
      g.mode = 'house';
      g.elapsed = g.delay;  // sort rapidement
      g.dy = -1;
    }
    return;
  }

  // ── Mode normal (scatter/chase/fright) ───────────────────
  // Synchroniser le mode selon le timer global
  if (!g.fright && g.mode !== 'house' && g.mode !== 'leaving' && g.mode !== 'eaten') {
    g.mode = globalMode;
  }

  // Cible
  let target = null;
  if (g.fright) {
    target = null;  // mouvement aléatoire
  } else if (g.mode === 'scatter') {
    target = g.scatter;
  } else {
    target = chaseTarget(g, ghosts.indexOf(g));
  }

  const spd = g.fright ? FRIGHT_SPD * dt : g.spd * dt;
  moveGhost(g, target, spd, false);
}

function chaseTarget(g, i) {
  const px = pac.x, py = pac.y, pdx = pac.dx, pdy = pac.dy;
  switch(i) {
    case 0: return { x: px, y: py };                                                 // Blinky : direct
    case 1: return { x: px + pdx * 4, y: py + pdy * 4 };                            // Pinky  : 4 devant
    case 2: {                                                                          // Inky   : vecteur
      const ax = px + pdx * 2, ay = py + pdy * 2, b = ghosts[0];
      return { x: ax + (ax - b.x), y: ay + (ay - b.y) };
    }
    case 3:                                                                            // Clyde  : conditionnel
      return Math.hypot(g.x - px, g.y - py) > 8 ? {x:px,y:py} : g.scatter;
    default: return { x: px, y: py };
  }
}

function moveGhost(g, target, spd, passGate) {
  // Décision de direction au centre de chaque cellule
  const cx = Math.round(g.x), cy = Math.round(g.y);
  const atCenter = Math.abs(g.x - cx) < spd + 0.08 && Math.abs(g.y - cy) < spd + 0.08;

  if (atCenter) {
    g.x = cx; g.y = cy;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    // Pas de demi-tour (sauf si bloqué)
    const valid = dirs.filter(([dx,dy]) => {
      if (dx === -g.dx && dy === -g.dy) return false;
      return canMove(cx, cy, dx, dy, passGate || g.eaten);
    });

    const choices = valid.length ? valid : dirs.filter(([dx,dy]) =>
      canMove(cx, cy, dx, dy, passGate || g.eaten)
    );

    if (choices.length) {
      let chosen;
      if (!target) {
        chosen = choices[Math.floor(Math.random() * choices.length)];
      } else {
        chosen = choices.reduce((best, d) => {
          const nd = Math.hypot(cx + d[0] - target.x, cy + d[1] - target.y);
          const bd = Math.hypot(cx + best[0] - target.x, cy + best[1] - target.y);
          return nd < bd ? d : best;
        });
      }
      [g.dx, g.dy] = chosen;
    }
  }

  g.x += g.dx * spd;
  g.y += g.dy * spd;

  // Tunnel wrap
  if (g.x < -0.5) g.x = COLS - 0.5;
  if (g.x > COLS - 0.5) g.x = -0.5;
}

function moveToTarget(g, target, spd, passGate) {
  const dx = target.x - g.x, dy = target.y - g.y;
  const dist = Math.hypot(dx, dy);
  if (dist < spd) { g.x = target.x; g.y = target.y; return; }
  moveGhost(g, target, spd, passGate);
}

// ═══════════════════════════════════════════════════════════════
// COLLISIONS PAC ↔ FANTÔMES
// ═══════════════════════════════════════════════════════════════
function checkCollisions() {
  for (const g of ghosts) {
    if (g.mode === 'house' || g.mode === 'leaving') continue;
    if (g.eaten) continue;
    const dist = Math.hypot(pac.x - g.x, pac.y - g.y);
    if (dist >= 0.85) continue;

    if (g.fright) {
      // Manger le fantôme
      g.fright = false; g.eaten = true;
      const pts = 200 * Math.pow(2, eatMult - 1);
      eatMult = Math.min(eatMult + 1, 8);
      score += pts; hud();
      SFX.ghost();
      popups.push({ x: g.x, y: g.y, txt: pts, ttl: 0.8, age: 0 });
    } else {
      // Pac meurt
      triggerDie();
      return;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// TRANSITIONS D'ÉTAT
// ═══════════════════════════════════════════════════════════════
function triggerDie() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.DYING;
  SFX.die();
  setTimeout(() => {
    lives--;
    if (lives <= 0) {
      if (score > hiScore) { hiScore = score; try { localStorage.setItem('pm_hi', hiScore); } catch(e){} }
      gameState = STATE.GAMEOVER;
      showOverlay('GAME OVER', '#f44', true);
    } else {
      hud();
      spawnPac(); spawnGhosts();
      gameState = STATE.PLAYING;
    }
  }, 1800);
}

function triggerWin() {
  if (gameState !== STATE.PLAYING) return;
  gameState = STATE.WIN;
  flashTimer = 3.0;  // sec
  SFX.win();
  setTimeout(() => {
    level++;
    initLevel(true);
    gameState = STATE.PLAYING;
    showBanner(`CARTE ${mapIdx()+1}/3 — ${MAP_NAMES[mapIdx()]}`, 2200);
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════════
function hud() {
  document.getElementById('v-score').textContent = score;
  document.getElementById('v-level').textContent = level;
  document.getElementById('v-map').textContent   = `${mapIdx()+1}/3`;
  document.getElementById('v-hi').textContent    = hiScore;
  document.getElementById('v-lives').textContent = '●'.repeat(Math.max(0, lives));
}

function showBanner(msg, dur) {
  const b = document.getElementById('banner');
  b.textContent = msg; b.style.display = 'block';
  clearTimeout(b._t);
  b._t = setTimeout(() => { b.style.display = 'none'; }, dur);
}

// ═══════════════════════════════════════════════════════════════
// RENDU
// ═══════════════════════════════════════════════════════════════
let tick = 0;  // compteur frames pour animations

function drawMaze() {
  const mi   = mapIdx();
  const wcol = WALL_COLORS[mi];

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const v = maze[r][c];
      const x = c * TILE, y = r * TILE;
      if (v === T_WALL) {
        ctx.fillStyle = wcol;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
      } else if (v === T_DOT) {
        ctx.fillStyle = '#ffccbb';
        ctx.beginPath();
        ctx.arc(x + TILE/2, y + TILE/2, 2, 0, TWO_PI);
        ctx.fill();
      } else if (v === T_POWER) {
        const pulse = 0.55 + 0.45 * Math.sin(tick * 0.1);
        ctx.fillStyle = `rgba(255,200,80,${pulse})`;
        ctx.beginPath();
        ctx.arc(x + TILE/2, y + TILE/2, 5.5, 0, TWO_PI);
        ctx.fill();
      } else if (v === T_DOOR) {
        ctx.fillStyle = '#dd88ff';
        ctx.fillRect(x + 2, y + TILE/2 - 1.5, TILE - 4, 3);
      }
    }
  }
}

function drawPac() {
  const x = pac.x * TILE + TILE/2;
  const y = pac.y * TILE + TILE/2;
  const r = TILE * 0.44;

  let angle = 0;
  if (pac.dx ===  1) angle = 0;
  else if (pac.dx === -1) angle = Math.PI;
  else if (pac.dy === -1) angle = -Math.PI/2;
  else if (pac.dy ===  1) angle =  Math.PI/2;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Animation de mort
  if (gameState === STATE.DYING) {
    const prog = Math.min((Date.now() % 1800) / 1800, 1);
    const open = Math.PI * prog;
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, open, TWO_PI - open);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    return;
  }

  // Bouche animée
  const mouthOpen = (0.1 + 0.15 * Math.abs(Math.sin(tick * 0.18))) * Math.PI;

  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.moveTo(0, 0);
  ctx.arc(0, 0, r, mouthOpen, TWO_PI - mouthOpen);
  ctx.closePath(); ctx.fill();

  // Reflet
  ctx.fillStyle = 'rgba(255,255,200,0.25)';
  ctx.beginPath(); ctx.arc(-r * 0.2, -r * 0.25, r * 0.38, 0, TWO_PI); ctx.fill();

  // Œil
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(r * 0.18, -r * 0.5, r * 0.1, 0, TWO_PI); ctx.fill();

  ctx.restore();
}

function drawGhost(g) {
  if (g.mode === 'house' && g.elapsed < g.delay * 0.3) return;
  const x = g.x * TILE + TILE/2;
  const y = g.y * TILE + TILE/2;
  const r = TILE * 0.44;

  ctx.save();
  ctx.translate(x, y);

  // Fantôme mangé = seulement les yeux
  if (g.eaten) {
    drawEyes(r, g.dx, g.dy);
    ctx.restore();
    return;
  }

  // Couleur selon état
  let col = g.col;
  if (g.fright) {
    const blinking = powerTimer < 1.5 && Math.floor(powerTimer / 0.25) % 2 === 0;
    col = blinking ? '#ffffff' : '#2233cc';
  }

  // Corps
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(0, 0, r, Math.PI, 0, false);
  ctx.lineTo(r, r);
  const w3 = (r * 2) / 3;
  for (let i = 3; i >= 0; i--) {
    ctx.lineTo(r - i * w3, r + (i % 2 === 0 ? 0 : r * 0.32));
  }
  ctx.lineTo(-r, r);
  ctx.closePath();
  ctx.fill();

  if (g.fright) {
    // Visage effrayé
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-r*.32, -r*.08, r*.15, 0, TWO_PI); ctx.fill();
    ctx.beginPath(); ctx.arc( r*.32, -r*.08, r*.15, 0, TWO_PI); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-r*.38, r*.22);
    for (let i = 0; i <= 4; i++) ctx.lineTo(-r*.38 + i*.19*r, r*.22 + (i%2===0 ? .14 : -.14)*r);
    ctx.stroke();
  } else {
    drawEyes(r, g.dx, g.dy);
  }

  ctx.restore();
}

function drawEyes(r, dx, dy) {
  const ex = dx * r * 0.1, ey = dy * r * 0.1;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-r*.28, -r*.1, r*.2, 0, TWO_PI); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.28, -r*.1, r*.2, 0, TWO_PI); ctx.fill();
  ctx.fillStyle = '#00b';
  ctx.beginPath(); ctx.arc(-r*.28+ex, -r*.1+ey, r*.1, 0, TWO_PI); ctx.fill();
  ctx.beginPath(); ctx.arc( r*.28+ex, -r*.1+ey, r*.1, 0, TWO_PI); ctx.fill();
}

function drawPopups(dt) {
  ctx.textAlign = 'center';
  ctx.font = 'bold 11px monospace';
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.age += dt; p.y -= dt * 0.8;
    if (p.age >= p.ttl) { popups.splice(i, 1); continue; }
    ctx.globalAlpha = 1 - p.age / p.ttl;
    ctx.fillStyle = '#0ff';
    ctx.fillText(p.txt, p.x * TILE + TILE/2, p.y * TILE);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawFlash(dt) {
  if (flashTimer <= 0) return;
  flashTimer -= dt;
  const mi = mapIdx();
  if (Math.floor(flashTimer / 0.2) % 2 === 0) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (maze[r][c] === T_WALL) ctx.strokeRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
      }
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// BOUCLE PRINCIPALE
// ═══════════════════════════════════════════════════════════════
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTs) / 1000, 0.05);  // max 50ms (cap lag)
  lastTs = ts;
  tick++;

  drawMaze();

  if (gameState === STATE.PLAYING) {
    updatePac(dt);
    updateGhosts(dt);
    checkCollisions();
  }

  if (gameState === STATE.PLAYING || gameState === STATE.DYING || gameState === STATE.WIN) {
    ghosts.forEach(drawGhost);
    drawPac();
    drawPopups(dt);
    drawFlash(dt);
  }
}

// ═══════════════════════════════════════════════════════════════
// INPUT — CLAVIER
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const map = { ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
                w:[0,-1], s:[0,1], a:[-1,0], d:[1,0] };
  const d = map[e.key];
  if (d && gameState === STATE.PLAYING) {
    pac.nx = d[0]; pac.ny = d[1];
    e.preventDefault();
  }
});

// ═══════════════════════════════════════════════════════════════
// INPUT — BOUTONS D-PAD
// ═══════════════════════════════════════════════════════════════
[['btn-up',0,-1],['btn-left',-1,0],['btn-down',0,1],['btn-right',1,0]].forEach(([id,dx,dy]) => {
  const el = document.getElementById(id);
  const fn = e => {
    e.preventDefault();
    e.stopPropagation();
    if (gameState === STATE.PLAYING) {
      pac.nx = dx; pac.ny = dy;
      // Allow immediate reversal only when actually moving in the opposite direction
      const isReversal = (dx !== 0 && pac.dx === -dx) || (dy !== 0 && pac.dy === -dy);
      if (isReversal) { pac.dx = dx; pac.dy = dy; }
    }
    unlockAudio();
  };
  el.addEventListener('pointerdown', fn);
  el.addEventListener('touchstart',  fn, { passive: false });
  el.addEventListener('mousedown',   fn);
});

// ═══════════════════════════════════════════════════════════════
// INPUT — SWIPE SUR CANVAS
// ═══════════════════════════════════════════════════════════════
let swipeX = null, swipeY = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  swipeX = e.touches[0].clientX;
  swipeY = e.touches[0].clientY;
  unlockAudio();
}, { passive: false });

canvas.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (swipeX === null || gameState !== STATE.PLAYING) { swipeX = swipeY = null; return; }
  const dx = e.changedTouches[0].clientX - swipeX;
  const dy = e.changedTouches[0].clientY - swipeY;
  if (Math.abs(dx) > 12 || Math.abs(dy) > 12) {
    if (Math.abs(dx) >= Math.abs(dy)) { pac.nx = dx > 0 ? 1 : -1; pac.ny = 0; }
    else                              { pac.ny = dy > 0 ? 1 : -1; pac.nx = 0; }
  }
  swipeX = swipeY = null;
}, { passive: false });

// ═══════════════════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════════════════
const ov    = document.getElementById('ov');
const ovBtn = document.getElementById('ov-btn');

function showOverlay(title, color, showScore = false) {
  ov.innerHTML = `
    <h1>PAC-MAN</h1>
    ${title !== 'PAC-MAN' ? `<p style="font-size:20px;color:${color};font-weight:bold;letter-spacing:2px">${title}</p>` : ''}
    ${showScore ? `<p class="big">${score.toLocaleString()} pts</p>` : ''}
    ${showScore && score >= hiScore && score > 0 ? `<p class="rec">★ NOUVEAU RECORD ★</p>` : ''}
    ${showScore ? `<p class="info">Carte ${mapIdx()+1}/3 — ${MAP_NAMES[mapIdx()]} · Niveau ${level}</p>` : ''}
    ${!showScore ? `<p class="sub">3 cartes uniques &nbsp;·&nbsp; Difficulté progressive<br>Swipe ou flèches pour jouer</p>` : ''}
    <p style="font-size:11px;color:#555;margin-top:4px">Record : ${hiScore.toLocaleString()}</p>
    <button id="ov-btn2">▶&nbsp; ${showScore ? 'REJOUER' : 'JOUER'}</button>
  `;
  ov.style.display = 'flex';
  document.getElementById('ov-btn2').addEventListener('click', startGame);
  document.getElementById('ov-btn2').addEventListener('touchend', e => { e.preventDefault(); startGame(); });
}

function startGame() {
  unlockAudio();
  ov.style.display = 'none';
  level = 1; score = 0; lives = 3;
  initLevel(true);
  gameState = STATE.PLAYING;
  SFX.start();
  showBanner('CARTE 1/3 — Classique', 2000);
}

// Bouton initial (titre)
ovBtn.addEventListener('click', startGame);
ovBtn.addEventListener('touchend', e => { e.preventDefault(); startGame(); });

// ═══════════════════════════════════════════════════════════════
// DÉMARRAGE
// ═══════════════════════════════════════════════════════════════
try { hiScore = parseInt(localStorage.getItem('pm_hi')) || 0; } catch(e) { hiScore = 0; }
level = 1; score = 0; lives = 3;
initLevel(true);  // pré-initialiser pour afficher la carte derrière l'overlay

requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });

// ── PWA Service Worker ──────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
